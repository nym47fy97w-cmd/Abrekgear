name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları çek
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Lint kontrolü
        run: npm run lint

      - name: Production build
        run: npm run build
